<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sun Eden</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      a-scene {
        display: block;
        height: 100%;
        width: 100%;
      }
    </style>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
    <script>
      var PLANET_RADIUS = 8;
      var PLANET_CENTER = new THREE.Vector3(0, 0, 0);
      var NIGHT_MODE_DELAY_MS = 9000;
      var NIGHT_MODE_TRANSITION_MS = 14000;
      var NIGHT_MODE_DAY_HOLD_MS = 26000;
      var NIGHT_MODE_NIGHT_HOLD_MS = 70000;
      var NIGHT_RIVER_MATERIAL = null;
      var NIGHT_MODE_AMOUNT = 0;

      /*
       * Mountain hub at meridian (π + 0.48): subtract this from −houseLat − bias so peak,
       * observers, rim-cloud hub, and eagle hub move slightly further from the winding river.
       * Keep river-mountain-weather init (+ eagle HTML/schema defaults) in sync with this value.
       */
      var MOUNTAIN_INLAND_LAT_SHIFT = 0.055;

      function makeRng(seed) {
        return function () {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        };
      }

      function getSurfaceFrame(normal) {
        var up = normal.clone().normalize();
        var worldUp = new THREE.Vector3(0, 1, 0);
        var east = new THREE.Vector3().crossVectors(worldUp, up);
        if (east.lengthSq() < 0.0001) east.set(1, 0, 0);
        east.normalize();
        var north = new THREE.Vector3().crossVectors(up, east).normalize();
        return { up: up, east: east, north: north };
      }

      /* Matches `createCampfireBenches` geometry so seated figures align with a chosen bench slot */
      function computeCampfireBenchAnchor(campfireUnit, benchIndex) {
        var R = PLANET_RADIUS;
        var frame = getSurfaceFrame(campfireUnit);
        var up = frame.up;
        var tangentialChord = 0.66 * 2.25;
        var deltaAng = tangentialChord / R;
        var bi = benchIndex;
        var rnd = function (salt) {
          var w = Math.imul(bi * 59 + salt * 97, 2654435761);
          return ((w >>> 0) % 10000) / 10000;
        };
        var ba = (bi / 5) * Math.PI * 2 + 0.22;
        var baJ =
          ba +
          (bi % 3 - 1) * 0.09 +
          (rnd(0) - 0.5) * 0.14;
        var tdir = frame.east
          .clone()
          .multiplyScalar(Math.cos(baJ))
          .add(frame.north.clone().multiplyScalar(Math.sin(baJ)))
          .normalize();
        var benchN = up
          .clone()
          .multiplyScalar(Math.cos(deltaAng))
          .add(tdir.clone().multiplyScalar(Math.sin(deltaAng)))
          .normalize();
        var towardFire = up
          .clone()
          .multiplyScalar(PLANET_RADIUS)
          .sub(benchN.clone().multiplyScalar(PLANET_RADIUS));
        towardFire
          .sub(
            benchN.clone().multiplyScalar(towardFire.dot(benchN))
          )
          .normalize();
        return {
          benchN: benchN,
          towardFire: towardFire,
          tdir: tdir,
          rnd: rnd
        };
      }

      function placeYUpEntityOnPlanet(el, normal, heightOffset) {
        var position = PLANET_CENTER.clone().add(
          normal.clone().multiplyScalar(PLANET_RADIUS + (heightOffset || 0))
        );
        var quaternion = new THREE.Quaternion().setFromUnitVectors(
          new THREE.Vector3(0, 1, 0),
          normal.clone().normalize()
        );
        el.setAttribute("position", position.x + " " + position.y + " " + position.z);
        el.object3D.quaternion.copy(quaternion);
      }

      function placeCircleOnPlanet(el, normal, radius) {
        var position = PLANET_CENTER.clone().add(
          normal.clone().multiplyScalar(PLANET_RADIUS + 0.035)
        );
        var quaternion = new THREE.Quaternion().setFromUnitVectors(
          new THREE.Vector3(0, 0, 1),
          normal.clone().normalize()
        );
        el.setAttribute("position", position.x + " " + position.y + " " + position.z);
        el.setAttribute("radius", radius);
        el.object3D.quaternion.copy(quaternion);
      }

      AFRAME.registerComponent("fisher-head-look", {
        init: function () {
          this.t = 0;
          this.currentY = 0;
          this.targetY = THREE.MathUtils.degToRad(5);
          this.hold = 1.8;
          this.nextPick = 0;
        },
        tick: function (_, deltaMs) {
          var dt = Math.min((deltaMs || 16) / 1000, 0.05);
          this.t += dt;
          this.hold -= dt;
          if (this.hold <= 0) {
            var pick = Math.sin(this.t * 1.73) > 0 ? 1 : -1;
            this.targetY = THREE.MathUtils.degToRad(pick * (4 + Math.abs(Math.sin(this.t * 0.41)) * 7));
            this.hold = 1.3 + Math.abs(Math.sin(this.t * 0.67)) * 2.4;
          }
          this.currentY += (this.targetY - this.currentY) * (1 - Math.exp(-2.4 * dt));
          this.el.object3D.rotation.order = "XYZ";
          this.el.object3D.rotation.x = THREE.MathUtils.degToRad(-19);
          this.el.object3D.rotation.y = this.currentY;
          this.el.object3D.rotation.z = 0;
        }
      });

      AFRAME.registerComponent("fishing-line-sway", {
        schema: {
          sx: { type: "number", default: 0 },
          sy: { type: "number", default: 0 },
          sz: { type: "number", default: 0 },
          ex: { type: "number", default: 0 },
          ey: { type: "number", default: 0 },
          ez: { type: "number", default: 0 },
          amp: { type: "number", default: 0.035 },
          speed: { type: "number", default: 0.9 }
        },
        init: function () {
          this.start = new THREE.Vector3();
          this.end = new THREE.Vector3();
          this.mid = new THREE.Vector3();
          this.dir = new THREE.Vector3();
        },
        tick: function (timeMs) {
          var d = this.data;
          var t = timeMs * 0.001;
          this.start.set(d.sx, d.sy, d.sz);
          this.end.set(
            d.ex + Math.sin(t * d.speed) * d.amp,
            d.ey,
            d.ez + Math.sin(t * d.speed * 0.73 + 1.4) * d.amp * 0.65
          );
          this.mid.copy(this.start).add(this.end).multiplyScalar(0.5);
          this.dir.copy(this.end).sub(this.start);
          var len = this.dir.length();
          if (len < 1e-6) return;
          this.dir.multiplyScalar(1 / len);
          this.el.object3D.position.copy(this.mid);
          this.el.object3D.scale.y = len / Math.max(1e-6, this.el.getAttribute("height"));
          this.el.object3D.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), this.dir);
        }
      });

      AFRAME.registerComponent("dystopian-night-cycle", {
        schema: {
          delayMs: { type: "number", default: NIGHT_MODE_DELAY_MS },
          transitionMs: { type: "number", default: NIGHT_MODE_TRANSITION_MS },
          dayHoldMs: { type: "number", default: NIGHT_MODE_DAY_HOLD_MS },
          nightHoldMs: { type: "number", default: NIGHT_MODE_NIGHT_HOLD_MS }
        },
        init: function () {
          this.t = 0;
          this.nightVisible = false;
          this.daySky = new THREE.Color("#56B9EF");
          this.nightSky = new THREE.Color("#E17824");
          this.dayFog = new THREE.Color("#56B9EF");
          this.nightFog = new THREE.Color("#8F3D22");
          this.dayPlanet = new THREE.Color("#39B54A");
          this.nightPlanet = new THREE.Color("#4A5A2C");
          this.tmpColor = new THREE.Color();
          this.sky = document.querySelector("#sky");
          this.sun = document.querySelector("#sun");
          this.moon = document.querySelector("#moon");
          this.moonCore = document.querySelector("#moonCore");
          this.moonHalo = document.querySelector("#moonHalo");
          this.moonOuterHalo = document.querySelector("#moonOuterHalo");
          this.planet = document.querySelector("#planet");
          this.ambientLight = document.querySelector("#ambientLight");
          this.keyLight = document.querySelector("#keyLight");
          this.emberField = document.querySelector("#nightEmbers");
          this.nightEls = [];
          this.nightSmokeEls = [];
          this.smokeOpacity = 0;
        },
        ensureRefs: function () {
          if (!this.sky) this.sky = document.querySelector("#sky");
          if (!this.sun) this.sun = document.querySelector("#sun");
          if (!this.moon) this.moon = document.querySelector("#moon");
          if (!this.moonCore) this.moonCore = document.querySelector("#moonCore");
          if (!this.moonHalo) this.moonHalo = document.querySelector("#moonHalo");
          if (!this.moonOuterHalo) this.moonOuterHalo = document.querySelector("#moonOuterHalo");
          if (!this.planet) this.planet = document.querySelector("#planet");
          if (!this.ambientLight) this.ambientLight = document.querySelector("#ambientLight");
          if (!this.keyLight) this.keyLight = document.querySelector("#keyLight");
          if (!this.emberField) this.emberField = document.querySelector("#nightEmbers");
          var currentNightEls = document.querySelectorAll(".night-only");
          if (currentNightEls.length !== this.nightEls.length) {
            this.nightEls = Array.prototype.slice.call(currentNightEls);
          }
          var currentSmokeEls = document.querySelectorAll(".night-smoke");
          if (currentSmokeEls.length !== this.nightSmokeEls.length) {
            this.nightSmokeEls = Array.prototype.slice.call(currentSmokeEls);
          }
        },
        setGroupOpacity: function (root, opacity) {
          if (!root) return;
          root.object3D.traverse(function (node) {
            if (!node.isMesh || !node.material) return;
            if (node.userData.baseOpacity === undefined) {
              node.userData.baseOpacity =
                node.material.opacity !== undefined ? node.material.opacity : 1;
            }
            node.material.transparent = true;
            node.material.opacity = node.userData.baseOpacity * opacity;
            node.material.needsUpdate = true;
          });
        },
        setNightOpacity: function (opacity) {
          if (!this.nightEls.length) return;
          for (var i = 0; i < this.nightEls.length; i++) {
            var el = this.nightEls[i];
            if (
              el.classList &&
              el.classList.contains("night-smoke")
            )
              continue;
            el.object3D.visible = opacity > 0.001;
            this.setGroupOpacity(el, opacity);
          }
        },
        setSmokeOpacity: function (nightAmount) {
          this.smokeOpacity = nightAmount;
          for (var i = 0; i < this.nightSmokeEls.length; i++) {
            var el = this.nightSmokeEls[i];
            el.object3D.visible = this.smokeOpacity > 0.001;
          }
        },
        setFixedOpacity: function (el, opacity) {
          if (!el) return;
          el.object3D.traverse(function (node) {
            if (!node.isMesh || !node.material) return;
            node.material.transparent = true;
            node.material.opacity = opacity;
            node.material.needsUpdate = true;
          });
        },
        tick: function (_, deltaMs) {
          this.ensureRefs();
          this.t += deltaMs;
          var transitionMs = Math.max(1, this.data.transitionMs);
          var dayHoldMs = Math.max(0, this.data.dayHoldMs);
          var nightHoldMs = Math.max(0, this.data.nightHoldMs);
          var cycleMs = dayHoldMs + transitionMs + nightHoldMs + transitionMs;
          var cycleT = this.t - this.data.delayMs;
          var p = 0;
          if (cycleT >= 0) {
            cycleT = cycleT % cycleMs;
            if (cycleT < dayHoldMs) {
              p = 0;
            } else if (cycleT < dayHoldMs + transitionMs) {
              p = (cycleT - dayHoldMs) / transitionMs;
            } else if (cycleT < dayHoldMs + transitionMs + nightHoldMs) {
              p = 1;
            } else {
              p =
                1 -
                (cycleT - dayHoldMs - transitionMs - nightHoldMs) /
                  transitionMs;
            }
          }
          p = p * p * p * (p * (p * 6 - 15) + 10);
          NIGHT_MODE_AMOUNT = p;

          if (this.sky) {
            this.tmpColor.copy(this.daySky).lerp(this.nightSky, p);
            this.sky.setAttribute("color", "#" + this.tmpColor.getHexString());
          }
          this.tmpColor.copy(this.dayFog).lerp(this.nightFog, p);
          this.el.setAttribute(
            "fog",
            "type: exponential; color: #" +
              this.tmpColor.getHexString() +
              "; density: " +
              THREE.MathUtils.lerp(0.001, 0.027, p)
          );
          if (this.planet) {
            this.tmpColor.copy(this.dayPlanet).lerp(this.nightPlanet, p);
            this.planet.setAttribute("color", "#" + this.tmpColor.getHexString());
            this.planet.setAttribute(
              "material",
              "shader: standard; roughness: 1; metalness: 0; emissive: #3a210f; emissiveIntensity: " +
                THREE.MathUtils.lerp(0.05, 0.18, p)
            );
          }
          if (this.ambientLight)
            this.ambientLight.setAttribute(
              "light",
              "type: ambient; intensity: " + THREE.MathUtils.lerp(0.78, 0.24, p)
            );
          if (this.keyLight)
            this.keyLight.setAttribute(
              "light",
              "type: directional; intensity: " + THREE.MathUtils.lerp(0.95, 0.18, p)
            );
          if (NIGHT_RIVER_MATERIAL && NIGHT_RIVER_MATERIAL.uniforms.nightMix) {
            NIGHT_RIVER_MATERIAL.uniforms.nightMix.value = p;
          }
          var sunOpacity = THREE.MathUtils.clamp(1 - p, 0, 1);
          var moonOpacity = THREE.MathUtils.clamp(p, 0, 1);
          if (this.sun) {
            this.sun.object3D.visible = sunOpacity > 0.001;
            this.sun.object3D.position.set(
              -58,
              THREE.MathUtils.lerp(148, 8, p),
              -58
            );
            this.setGroupOpacity(this.sun, sunOpacity);
            var sunLight = this.sun.querySelector("[light]");
            if (sunLight)
              sunLight.setAttribute(
                "light",
                "type: point; intensity: " +
                  THREE.MathUtils.lerp(1.1, 0, p) +
                  "; distance: 80; decay: 1.2"
              );
          }
          if (this.moon) {
            this.moon.object3D.visible = moonOpacity > 0.001;
            this.moon.object3D.position.set(
              -58,
              THREE.MathUtils.lerp(8, 148, p),
              -58
            );
          }
          if (this.moonCore)
            this.moonCore.setAttribute(
              "material",
              "shader: standard; roughness: 0.58; metalness: 0; emissive: #E7D9BC; emissiveIntensity: " +
                THREE.MathUtils.lerp(0, 0.95, p) +
                "; opacity: " +
                0.62 * moonOpacity +
                "; transparent: true; fog: false"
            );
          this.setFixedOpacity(this.moonHalo, 0.22 * moonOpacity);
          this.setFixedOpacity(this.moonOuterHalo, 0.08 * moonOpacity);
          this.setNightOpacity(p);
          this.setSmokeOpacity(p);
        }
      });

      AFRAME.registerComponent("night-smoke-puff", {
        schema: {
          baseOpacity: { type: "number", default: 0.28 },
          delay: { type: "number", default: 0 },
          dur: { type: "number", default: 3800 }
        },
        init: function () {
          this.mesh = null;
        },
        tick: function (time) {
          if (!this.mesh) {
            this.mesh = this.el.getObject3D("mesh");
            if (!this.mesh || !this.mesh.material) return;
            this.mesh.material.transparent = true;
            this.mesh.material.depthWrite = false;
          }
          var dur = Math.max(1, this.data.dur);
          var local = ((time - this.data.delay) % dur + dur) % dur;
          var phase = local / dur;
          var envelope = Math.sin(phase * Math.PI);
          envelope = Math.pow(Math.max(0, envelope), 1.25);
          this.mesh.material.opacity = this.data.baseOpacity * NIGHT_MODE_AMOUNT * envelope;
          this.mesh.material.needsUpdate = true;
        }
      });

      AFRAME.registerComponent("night-helicopter-search", {
        schema: {
          radius: { type: "number", default: 14.2 },
          speed: { type: "number", default: 0.18 },
          height: { type: "number", default: 3.3 }
        },
        init: function () {
          this.t = 0;
          this.tmpPos = new THREE.Vector3();
          this.tmpNext = new THREE.Vector3();
          this.up = new THREE.Vector3();
          this.forward = new THREE.Vector3();
          this.right = new THREE.Vector3();
          this.matrix = new THREE.Matrix4();
          this.beam = this.el.querySelector(".searchlight-rig");
          this.entryPos = new THREE.Vector3();
        },
        setOpacity: function (opacity) {
          this.el.object3D.traverse(function (node) {
            if (!node.isMesh || !node.material) return;
            if (node.userData.heliBaseOpacity === undefined) {
              node.userData.heliBaseOpacity =
                node.material.opacity !== undefined ? node.material.opacity : 1;
            }
            node.material.transparent = true;
            node.material.opacity = node.userData.heliBaseOpacity * opacity;
            node.material.needsUpdate = true;
          });
        },
        tick: function (_, deltaMs) {
          var night = NIGHT_MODE_AMOUNT;
          var fade = THREE.MathUtils.smoothstep(night, 0.001, 0.24);
          this.el.object3D.visible = fade > 0.001;
          if (fade <= 0.001) return;
          var dt = Math.min(deltaMs / 1000, 0.055);
          this.t += dt;
          var d = this.data;
          var a =
            -this.t * d.speed +
            Math.sin(this.t * 0.17) * 0.42 +
            Math.sin(this.t * 0.41 + 1.6) * 0.18;
          var rad =
            d.radius +
            Math.sin(this.t * 0.23 + 0.9) * 1.35 +
            Math.sin(this.t * 0.071) * 0.7;
          var y =
            d.height +
            Math.sin(this.t * 0.31 + 0.4) * 1.2 +
            Math.sin(this.t * 0.67) * 0.36;
          this.tmpPos.set(Math.sin(a) * rad, y, Math.cos(a) * rad);
          var a2 = a - 0.045 - Math.sin(this.t * 0.59) * 0.016;
          var rad2 = rad + Math.sin(this.t * 0.37) * 0.18;
          this.tmpNext.set(Math.sin(a2) * rad2, y, Math.cos(a2) * rad2);
          this.up.copy(this.tmpPos).normalize();
          this.forward.copy(this.tmpNext).sub(this.tmpPos);
          this.forward
            .sub(this.up.clone().multiplyScalar(this.forward.dot(this.up)))
            .normalize();
          this.right.crossVectors(this.up, this.forward).normalize();
          this.matrix.makeBasis(
            this.right.clone().multiplyScalar(-1),
            this.up,
            this.forward.clone().multiplyScalar(-1)
          );
          var entry = THREE.MathUtils.smoothstep(night, 0.025, 0.94);
          this.entryPos.copy(this.tmpPos).multiplyScalar(THREE.MathUtils.lerp(1.72, 1, entry));
          this.entryPos.y += THREE.MathUtils.lerp(7.2, 0, entry);
          this.el.object3D.position.copy(this.entryPos);
          this.el.object3D.quaternion.setFromRotationMatrix(this.matrix);
          this.setOpacity(fade);

          var sweep = Math.sin(this.t * 0.52) * 34 + Math.sin(this.t * 0.19 + 2.1) * 18;
          var tilt = 13 + Math.sin(this.t * 0.43 + 0.7) * 7;
          if (this.beam)
            this.beam.setAttribute("rotation", tilt + " " + sweep + " 0");
        }
      });

      /*
       * Same convention as trees (`placeYUpEntityOnPlanet`): local +Y = outward planet normal at anchor.
       * Radial is in world space, transformed into parent-local axes so it stays correct when #worldRoot spins.
       */
      AFRAME.registerComponent("planet-normal-up", {
        init: function () {
          this.qParent = new THREE.Quaternion();
          this.qInv = new THREE.Quaternion();
          this.radialWorld = new THREE.Vector3();
          this.radialLocal = new THREE.Vector3();
          this.balloonPos = new THREE.Vector3();
          this.planetPos = new THREE.Vector3();
          this.pole = new THREE.Vector3(0, 1, 0);
          this.qAlign = new THREE.Quaternion();
          this.planetEl = null;
        },
        tick: function () {
          if (!this.planetEl) {
            this.planetEl = document.querySelector("#planet");
            if (!this.planetEl) return;
          }
          var parent = this.el.object3D.parent;
          if (!parent) return;
          parent.updateMatrixWorld(true);
          parent.getWorldPosition(this.balloonPos);
          this.planetEl.object3D.getWorldPosition(this.planetPos);
          this.radialWorld.copy(this.balloonPos).sub(this.planetPos);
          if (this.radialWorld.lengthSq() < 1e-14) return;
          this.radialWorld.normalize();

          parent.getWorldQuaternion(this.qParent);
          this.qInv.copy(this.qParent).invert();
          this.radialLocal.copy(this.radialWorld).applyQuaternion(this.qInv);
          if (this.radialLocal.lengthSq() < 1e-14) return;
          this.radialLocal.normalize();

          this.qAlign.setFromUnitVectors(this.pole, this.radialLocal);
          this.el.object3D.quaternion.copy(this.qAlign);
        }
      });

      /* Four ropes: rim corners to exact points on the envelope ellipsoid (scaled sphere). */
      AFRAME.registerComponent("balloon-rig-ropes", {
        schema: {
          rimY: { type: "number", default: 0.48 },
          rimXZ: { type: "number", default: 0.31 },
          attachXZ: { type: "number", default: 0.352 },
          envelopeCy: { type: "number", default: 2.61 },
          radiusAx: { type: "number", default: 1.265 },
          radiusBy: { type: "number", default: 1.686 },
          ropeRadius: { type: "number", default: 0.015 }
        },
        init: function () {
          var d = this.data;
          var ax = d.radiusAx;
          var by = d.radiusBy;
          var cy = d.envelopeCy;
          var x = d.attachXZ;
          var horiz = (2 * x * x) / (ax * ax);
          var vySq = (1 - horiz) * by * by;
          if (vySq < 1e-10) vySq = 0;
          var attachY = cy - Math.sqrt(vySq);

          var corners = [[1, 1], [-1, 1], [1, -1], [-1, -1]];
          var mat = "shader: standard; roughness: 0.84; metalness: 0";
          var deg = THREE.MathUtils.radToDeg;
          var euler = new THREE.Euler();
          var q = new THREE.Quaternion();
          var vUp = new THREE.Vector3(0, 1, 0);
          var pi;
          for (pi = 0; pi < 4; pi++) {
            var sx = corners[pi][0];
            var sz = corners[pi][1];
            var x0 = sx * d.rimXZ;
            var z0 = sz * d.rimXZ;
            var y0 = d.rimY;
            var x1 = sx * d.attachXZ;
            var z1 = sz * d.attachXZ;
            var y1 = attachY;
            var dx = x1 - x0;
            var dy = y1 - y0;
            var dz = z1 - z0;
            var len = Math.sqrt(dx * dx + dy * dy + dz * dz);
            if (len < 1e-6) continue;
            var mx = (x0 + x1) * 0.5;
            var my = (y0 + y1) * 0.5;
            var mz = (z0 + z1) * 0.5;
            var dir = new THREE.Vector3(dx / len, dy / len, dz / len);
            q.setFromUnitVectors(vUp, dir);
            euler.setFromQuaternion(q, "XYZ");
            var cyl = document.createElement("a-cylinder");
            cyl.setAttribute("radius", d.ropeRadius);
            cyl.setAttribute("height", len);
            cyl.setAttribute("position", mx + " " + my + " " + mz);
            cyl.setAttribute(
              "rotation",
              deg(euler.x) + " " + deg(euler.y) + " " + deg(euler.z)
            );

      AFRAME.registerComponent("mountain-eagle-orbit", {
        schema: {

        init: function () {

          this.phase = 0;

            Math.sin(lon) * cosLat,
            Math.sin(lat),
            Math.cos(lon) * cosLat
          ).normalize();
          this.frame = getSurfaceFrame(this.normal);
          var qMount = new THREE.Quaternion().setFromUnitVectors(
            new THREE.Vector3(0, 1, 0),
            this.normal.clone()
          );
          var rootPos = PLANET_CENTER.clone().add(
            this.normal.clone().multiplyScalar(this.data.planetRadius + this.data.surfaceOffset)
          );

            this.data.summitLocalX,
            this.data.summitLocalY,
            this.data.summitLocalZ
          ).multiplyScalar(this.data.mountainScale);

            this.normal.clone().multiplyScalar(this.data.hoverLift)
          );
          this.orbitCenter.add(
            this.frame.east.clone().multiplyScalar(this.data.hubBiasEast)
          );
          this.orbitCenter.add(
            this.frame.north.clone().multiplyScalar(this.data.hubBiasNorth)
          );
        },
        samplePoint: function (phaseAng, timeSec) {
          var east = this.frame.east;
          var north = this.frame.north;
          var up = this.normal;
          var ps = this.data.pathScale;
          var ang = phaseAng;
          var r0 =
            1.02 +
            0.36 * Math.sin(ang * 0.43 + 0.82) +
            0.15 * Math.cos(ang * 1.19);
          var squash = 0.8 + 0.15 * Math.sin(ang * 0.63 + 1.05);
          var skew = 0.32 * Math.sin(ang * 0.31 + 0.22);
          var c = Math.cos(ang + 0.1 * Math.sin(ang * 2.08));
          var s = Math.sin(ang * 1.02 + 0.12 * Math.cos(ang * 1.73));
          var xe = (c * r0 + skew * Math.sin(ang * 2)) * ps;
          var xn =
            (s * r0 * squash + 0.21 * Math.cos(ang * 2.37 + 0.48)) * ps;
          var lift =
            this.data.liftBias +
            0.1 * Math.sin(timeSec * 1.02 + ang * 0.48) +
            0.07 * Math.cos(timeSec * 2.21) +
            0.048 * Math.sin(ang * 2.9 + timeSec * 0.38);
          return this.orbitCenter
            .clone()
            .add(east.clone().multiplyScalar(xe))
            .add(north.clone().multiplyScalar(xn))
            .add(up.clone().multiplyScalar(lift));

        tick: function (_, deltaMs) {
          var dt = Math.min(deltaMs / 1000, 0.05);
          this.t += dt;

            0.48 +
            0.17 * Math.sin(this.t * 0.35) +
            0.11 * Math.cos(this.t * 0.68 + 0.4);

          var lookAhead = 0.085 + 0.022 * Math.sin(this.t * 0.74);
          var posN = this.samplePoint(this.phase + lookAhead, this.t + lookAhead * 0.35);

          var radialUp = pos.clone().normalize();
          var forward = posN.clone().sub(pos);
          forward.sub(
            radialUp.clone().multiplyScalar(forward.dot(radialUp))
          );
          if (forward.lengthSq() < 1e-8) return;
          forward.normalize();
          var back = forward.clone().multiplyScalar(-1);
          var right = new THREE.Vector3().crossVectors(radialUp, back).normalize();
          var matrix = new THREE.Matrix4().makeBasis(right, radialUp, back);

          this.el.object3D.position.copy(pos);
          this.el.object3D.quaternion.setFromRotationMatrix(matrix);
        }
      });

              var fireForward = lookPosition.sub(position);
              forward.lerp(fireForward, nightTurn);

          forward.sub(normal.clone().multiplyScalar(forward.dot(normal)));

          forward.copy(this.smoothedForward);

              var gaze = this.holdHeadLook(this.modeT, NIGHT_MODE_AMOUNT, this.fireT);

        circleNormalAt: function (angle, target) {

            .set(
              Math.sin(longitude) * cosLat,
              Math.sin(latitude),
              Math.cos(longitude) * cosLat

            .normalize();

        ease01: function (value) {
          var t = THREE.MathUtils.clamp(value, 0, 1);

        holdHeadLook: function (time, nightAmount, fireTime) {

            if (!this.fireReturnToCamera(ft)) {
              var signPhase = this.fireSignPhase(ft);
              var scanYaw =
                Math.sin(ft * 0.48) * 4.8 +
                Math.sin(ft * 0.18 + 1.7) * 2.4;
              var scanPitch =
                10 +
                Math.sin(ft * 0.38 + 0.4) * 2.4 +
                Math.sin(ft * 0.14) * 1.1;

                pitch: THREE.MathUtils.lerp(32, scanPitch + signPhase * 1.5, fireLook),
                yaw: scanYaw * fireLook
              };

            if (!this.fireHeadReturnToCamera(ft)) {
              var settle = this.ease01((ft - 93) / 3.2);

                pitch: THREE.MathUtils.lerp(13, 8, settle) * fireLook,
                yaw: Math.sin(ft * 0.42) * 0.9 * (1 - settle) * fireLook
              };

          var basePitch = 32 + Math.sin(time * 0.31) * 0.55;
          var baseYaw =
            Math.sin(time * 0.23) * 0.7 +
            Math.sin(time * 0.071 + 1.8) * 0.45;
          var cycle = 47;
          var t = time % cycle;
          var glances = [
            { start: 9.4, dur: 3.1, pitch: 16, yaw: -13 },
            { start: 23.8, dur: 4.4, pitch: 20, yaw: 10 },
            { start: 38.6, dur: 2.7, pitch: 13, yaw: 16 }
          ];

          var yaw = baseYaw;

            .copy(from)
            .multiplyScalar(Math.sin((1 - amount) * omega) / sinOmega)
            .add(this.tmp.multiplyScalar(Math.sin(amount * omega) / sinOmega))
            .normalize();

        updateDefaultCameraVisitPoint: function () {

            this.el.sceneEl && this.el.sceneEl.querySelector(this.data.cameraSelector);
          var worldRoot = document.getElementById("worldRoot");
          if (!cameraEl || !cameraEl.object3D || !worldRoot || !worldRoot.object3D)
            return;

          cameraEl.object3D.updateMatrixWorld(true);
          worldRoot.object3D.updateMatrixWorld(true);

          var camWorld = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(camWorld);
          this.cameraLocal.copy(camWorld);
          worldRoot.object3D.worldToLocal(this.cameraLocal);

          this.cameraForward
            .set(0, 0, -1)
            .applyQuaternion(cameraEl.object3D.quaternion)
            .normalize();

          var b = this.cameraLocal.dot(this.cameraForward);
          var c = this.cameraLocal.lengthSq() - Math.pow(PLANET_RADIUS + 0.12, 2);
          var disc = b * b - c;
          if (disc >= 0) {
            var t = -b - Math.sqrt(disc);
            if (t < 0) t = -b + Math.sqrt(disc);
            if (t > 0) {
              this.visitNormal
                .copy(this.cameraLocal)
                .add(this.tmp.copy(this.cameraForward).multiplyScalar(t))
                .normalize();
              this.defaultCameraReady = true;
              return;
            }
          }

          this.visitNormal.copy(this.cameraLocal).normalize();
          this.defaultCameraReady = true;
        }
      });

      /*

        init: function () {
          this.angle = this.data.phaseOffset;

        tick: function (_, deltaMs) {

            0.58 +
            0.42 *
              Math.sin(
                this.angle * 0.19 + this.data.phaseOffset * 0.71
              );
          this.angle += this.data.speed * pulse * dt;
          var longitude =
            this.data.longitude +
            Math.cos(this.angle) * this.data.radiusLon;
          var latitude =
            this.data.latitude +
            Math.sin(this.angle) * this.data.radiusLat;
          var nextLongitude =
            this.data.longitude +
            Math.cos(this.angle + 0.04) * this.data.radiusLon;
          var nextLatitude =
            this.data.latitude +
            Math.sin(this.angle + 0.04) * this.data.radiusLat;

          var normal = new THREE.Vector3(
            Math.sin(longitude) * cosLat,
            Math.sin(latitude),
            Math.cos(longitude) * cosLat

          var nextCosLat = Math.cos(nextLatitude);
          var nextNormal = new THREE.Vector3(
            Math.sin(nextLongitude) * nextCosLat,
            Math.sin(nextLatitude),
            Math.cos(nextLongitude) * nextCosLat

            .clone()
            .multiplyScalar(PLANET_RADIUS + 0.12);

            .clone()

            .sub(

            .crossVectors(normal, back)
            .normalize();

            normal,
            back

          this.el.object3D.quaternion.setFromRotationMatrix(matrix);
          this.el.object3D.position.add(
            normal
              .clone()

                Math.abs(Math.sin(this.angle * 5)) * 0.035

          var rightLeg = this.el.querySelector(".right-leg");
          var leftArm = this.el.querySelector(".left-arm");

            leftLeg.setAttribute("rotation", swing + " 0 0");
          if (rightLeg)
            rightLeg.setAttribute("rotation", (-swing) + " 0 0");
          if (leftArm)
            leftArm.setAttribute(
              "rotation",
              -swing * 0.8 + " 0 10"
            );
          if (rightArm)
            rightArm.setAttribute(
              "rotation",
              swing * 0.8 + " 0 -10"

          if (head) {

              Math.sin(this.angle * 1.65) * 18 +
              Math.sin(
                this.angle * 0.41 + this.data.phaseOffset

              Math.sin(this.angle * 0.79) * 9;

      /*
       * Fixed seat on a campfire bench ring slot (same anchor math as createCampfireBenches).
       * Faces the fire; head yaw animates “looking around”.

        },
        init: function () {
          var cosLat = Math.cos(this.data.campfireLat);
          var campfireUnit = new THREE.Vector3(
            Math.sin(this.data.campfireLon) * cosLat,
            Math.sin(this.data.campfireLat),
            Math.cos(this.data.campfireLon) * cosLat

          var anchor = computeCampfireBenchAnchor(
            campfireUnit,
            this.data.benchIndex
          );
          var benchN = anchor.benchN;
          var towardFire = anchor.towardFire;
          /*
           * Clear the grass mesh: walkers use ~PLANET_RADIUS + 0.12 at the feet — seated rigs
           * need similar radial clearance. Root scale (~1.74×) multiplies poseWrap translation,
           * so large negative local Y drives hips/legs inward under the turf.
           */
          var back = towardFire.clone().multiplyScalar(-1);
          var right = new THREE.Vector3()
            .crossVectors(benchN, back)
            .normalize();
          var matrix = new THREE.Matrix4().makeBasis(
            right,
            benchN,
            back
          );
          var seatH = PLANET_RADIUS + 0.141;
          var seatPos = benchN.clone().multiplyScalar(seatH);
          /* Slight +towardFire nudges the seat a hair toward the campfire along the tangent */

          this.el.object3D.quaternion.setFromRotationMatrix(matrix);

            Math.sin(this.angle * 0.37) * 14;

            "rotation",
            "0 " + headYaw + " 0"
          );
        }

      AFRAME.registerComponent("giraffe-bottom-walk", {

            this.vLat *= -0.35;

            this.data.latMax

            Math.sin(lonAhead) * cosAhead,
            Math.sin(latAhead),
            Math.cos(lonAhead) * cosAhead

          this.el.object3D.position.copy(position);
          this.el.object3D.quaternion.setFromRotationMatrix(matrix);
          this.el.object3D.position.add(normal.clone().multiplyScalar(bob));

          var br = this.el.querySelector(".giraffe-leg-br");
          var neck = this.el.querySelector(".giraffe-neck");

        pickTarget: function (initial) {
          var px = this.el.object3D.position.x;
          var pz = this.el.object3D.position.z;
          var minMoveSq =
            initial ? 0 : 8e-5 + this._rnd() * 8e-5;

          var ti;

            samp =
              this.data.mode === "outside"
                ? this.sampleOutside()
                : this.sampleInside();
            var tdx = samp.x - px;
            var tdz = samp.z - pz;
            if (tdx * tdx + tdz * tdz >= minMoveSq + 2.4e-3) break;
          }

          this.targetZ = samp.z;
          this.idleLeft = initial ? 0.38 : 0.65 + this._rnd() * 2.2;

        tick: function (_, deltaMs) {
          var dt = Math.min(deltaMs / 1000, 1 / 30);
          var twoPi = Math.PI * 2;
          this._stepHopCooldown = Math.max(0, this._stepHopCooldown - dt);
          var pos = this.el.object3D.position;
          var pathLvl = this.data.feetY;

          var dx = this.targetX - pos.x;
          var dz = this.targetZ - pos.z;
          var distSq = dx * dx + dz * dz;
          var arrivingR = 0.038;

          var dist = Math.sqrt(distSq);
          var moving = dist > arrivingR;

          if (!moving) {
            this.idleLeft -= dt;
            this.stridePhase += dt * (2.25 + Math.sin(this.peckPhase) * 0.35);
            this.peckPhase += dt * (2.95 + Math.sin(this.stridePhase * 0.82) * 0.42);
            this.peckTilt = Math.sin(this.peckPhase) * 26;
            if (this.idleLeft <= 0) this.pickTarget(false);

            var invD = dist > 1e-8 ? 1 / dist : 0;
            var ux = dx * invD;
            var uz = dz * invD;

            if (cap < 0) cap = 0;
            pos.x += ux * cap;
            pos.z += uz * cap;
            this.pushOutsideFenceIfNeeded(pos, dt);

            var targetYaw = Math.atan2(ux, uz);
            var yawDiff = targetYaw - this.smoothYaw;
            while (yawDiff > Math.PI) yawDiff -= twoPi;
            while (yawDiff < -Math.PI) yawDiff += twoPi;
            this.smoothYaw += yawDiff * Math.min(1, dt * 9);
            this.el.object3D.rotation.y = this.smoothYaw;

            var speed01 = THREE.MathUtils.clamp(
              (dist - arrivingR) / 0.45,
              0.12,
              1
            );
            this.stridePhase += dt * (9.8 + speed01 * 5.9);
            this.peckPhase += dt * 0.42;
            this.peckTilt *= Math.pow(0.905, dt * 60);
          }

          var moveTarget = moving ? 1 : 0;
          var moveEase = moving ? 10.5 : 6.4;
          this.moveBlend +=
            (moveTarget - this.moveBlend) * (1 - Math.exp(-moveEase * dt));

          var stepExtra = 0;
          var bob =
            Math.abs(Math.sin(this.stridePhase)) * 0.0092 * this.moveBlend;

          var swing = Math.sin(this.stridePhase) * 46 * this.moveBlend;
          var legL = this.legL;
          var legR = this.legR;
          var headGrp = this.headGroup;
          if (legL) legL.setAttribute("rotation", swing + " 0 14");

          if (headGrp)
            headGrp.setAttribute(
              "rotation",
              (-this.peckTilt -
                Math.sin(this.stridePhase * 0.64) *
                  (moving ? 4 : 7)) +
                " " +
                Math.sin(this.peckPhase * 0.55) *
                  (moving ? 32 : 18) +
                " " +
                (moving ? Math.sin(this.stridePhase * 0.31) * 6 : 0)

          var wR = this.wingR;

              THREE.MathUtils.clamp(
                1 -
                  this.wingFlutterRem / flutterSpan,
                0,
                1

            flutterBell = Math.pow(
              Math.sin(Math.PI * progressed),
              1.55
            );
          }
          this.wingFlutterPh +=
            dt *
            this.wingFlutterOmega *
            flutterBell;
          var ph = this.wingFlutterPh;
          var gaitBeat =
            Math.sin(this.stridePhase * 2.75) *
            (moving ? 4.2 : 2.95);
          var wyBurstTar =
            flutterBell *
            Math.sin(ph) *
            26;
          var rzTar =
            flutterBell *
            Math.sin(ph * 2.08) *
            16;
          var rxTar =
            flutterBell *
            Math.cos(ph * 1.45) *
            11;
          var smActive = flutterBell > 0.12;
          var smK =
            Math.min(
              1,
              dt * (smActive ? 38 : 5.5)
            );

            this.wingFlutterRem <= 0 &&
            flutterBell < 1e-6

            this.wingFlutterRz *= 1 - dec;
            this.wingFlutterRx *= 1 - dec;
          }

          var foldHop = THREE.MathUtils.clamp(
            (Math.abs(stepExtra) + 1e-9) / 0.072,
            0,
            1
          );
          var foldBob = THREE.MathUtils.clamp(
            bob /
              ((moving ? 0.0092 : 0.005) + 1e-6),
            0,
            1
          );
          var sp = this.stridePhase;
          var strideLift = Math.abs(Math.sin(sp));
          var foldStride =
            Math.pow(strideLift, 17) * (moving ? 0.36 : 0.2);
          var foldRaw = Math.max(
            foldHop * 0.78,
            foldStride * (1 - foldHop * 0.35),
            foldBob * 0.22 * Math.pow(strideLift, 12)
          );
          var foldTarget = THREE.MathUtils.clamp(foldRaw, 0, 1);
          this.wingFoldSm +=
            (foldTarget - this.wingFoldSm) *
            Math.min(1, dt * 1.55);
          var fold = THREE.MathUtils.clamp(this.wingFoldSm, 0, 1);
          if (wL && wR) {
            var lx = THREE.MathUtils.lerp(14, 24, fold);
            var lyL = THREE.MathUtils.lerp(-34, -20, fold);
            var lzL = THREE.MathUtils.lerp(131, 98, fold);
            var wy = this.wingFlutterWy + gaitBeat;
            var rz = this.wingFlutterRz;
            var rx = this.wingFlutterRx;
            wL.setAttribute(
              "rotation",
              lx +
                rx +
                " " +
                (lyL + wy) +
                " " +
                (lzL + rz)
            );
            wR.setAttribute(
              "rotation",
              lx +
                rx +
                " " +
                (-lyL - wy) +
                " " +
                (-lzL - rz)
            );
            var sy = THREE.MathUtils.lerp(1, 0.78, fold);
            var sz = THREE.MathUtils.lerp(1, 0.86, fold);

            wR.setAttribute("scale", "1 " + sy + " " + sz);
          }
        }

        function riverLatitude(longitude) {

        function riverPoint(longitude, latitude, heightOffset) {

            Math.sin(latitude),
            Math.cos(longitude) * cosLat

        function createWoodenBridge(lon0, opts) {
          if (!opts) opts = {};
          var spanStretch =
            opts.spanStretch !== undefined && opts.spanStretch !== null
              ? opts.spanStretch
              : 1;
          var latRiver = riverLatitude(lon0);
          var riverHalfLat = 0.111 * spanStretch;
          var grassMargin = 0.047 * spanStretch;
          var latHi = latRiver + riverHalfLat + grassMargin;
          var latLo = latRiver - riverHalfLat - grassMargin;

          function surfPt(lon, lat) {
            var c = Math.cos(lat);
            return new THREE.Vector3(
              Math.sin(lon) * c,
              Math.sin(lat),
              Math.cos(lon) * c
            ).multiplyScalar(PLANET_RADIUS);
          }

          var bankHi = surfPt(lon0, latHi);
          var bankLo = surfPt(lon0, latLo);
          var mid = bankHi.clone().add(bankLo).multiplyScalar(0.5);
          var bridgeNormal = mid.clone().normalize();

          var zSpan = bankHi.clone().sub(bankLo);
          zSpan.sub(bridgeNormal.clone().multiplyScalar(zSpan.dot(bridgeNormal))).normalize();

          var dLon = 0.018;
          var latE = riverLatitude(lon0 + dLon);
          var c0 = Math.cos(latRiver);
          var c1 = Math.cos(latE);
          var pAlong0 = new THREE.Vector3(
            Math.sin(lon0) * c0,
            Math.sin(latRiver),
            Math.cos(lon0) * c0
          ).multiplyScalar(PLANET_RADIUS);
          var pAlong1 = new THREE.Vector3(
            Math.sin(lon0 + dLon) * c1,
            Math.sin(latE),
            Math.cos(lon0 + dLon) * c1
          ).multiplyScalar(PLANET_RADIUS);
          var alongRiver = pAlong1.clone().sub(pAlong0).normalize();

          var xWidth = new THREE.Vector3().crossVectors(bridgeNormal, zSpan).normalize();
          if (xWidth.dot(alongRiver) < 0) xWidth.multiplyScalar(-1);
          var yUp = new THREE.Vector3().crossVectors(zSpan, xWidth).normalize();

        var beachBall = {

        var riverAnimPrevMs = null;

        function animateRiver(timeMs) {
          riverMaterial.uniforms.time.value = timeMs * 0.0003;
          var tSec = timeMs * 0.001;
          var dtSec = riverAnimPrevMs === null ? 0.016 : Math.min((timeMs - riverAnimPrevMs) / 1000, 0.055);
          riverAnimPrevMs = timeMs;
          var twoPi = Math.PI * 2;
          var posSmoothRate = 1 - Math.exp(-11 * dtSec);
          var fwdSmoothRate = 1 - Math.exp(-9 * dtSec);
          var rotSmoothRate = 1 - Math.exp(-6.8 * dtSec);

          for (var fj = 0; fj < fishSchool.length; fj++) {
            var fish = fishSchool[fj];
            var lon = fish.phase + tSec * fish.speed * fish.dir;
            lon = ((lon % twoPi) + twoPi) % twoPi;

            var swayBody =
              Math.sin(tSec * fish.wobbleSpeed + fish.wobble) * 0.017 +
              Math.sin(tSec * fish.wobbleSpeed * 1.61 + fish.wobble * 1.55) * 0.009;
            var swayTail =
              Math.sin(tSec * fish.wobbleSpeed * 2.35 + fish.wobble * 0.9) * 0.006;
            var latRiver = riverLatitude(lon);
            var lat = latRiver + fish.lateral + swayBody;

            var bob =
              Math.sin(tSec * fish.wobbleSpeed * 2.08 + fish.wobble * 0.73) * 0.012 +
              swayTail * 0.85;
            var waterH = 0.068 + bob;

            var pos = riverPoint(lon, lat, waterH);

            var eps = 0.048 * fish.dir;
            var lonM = lon - eps;
            var lonP = lon + eps;
            lonM = ((lonM % twoPi) + twoPi) % twoPi;
            lonP = ((lonP % twoPi) + twoPi) % twoPi;
            var latM = riverLatitude(lonM) + fish.lateral + swayBody;
            var latP = riverLatitude(lonP) + fish.lateral + swayBody;
            var posM = riverPoint(lonM, latM, waterH);
            var posP = riverPoint(lonP, latP, waterH);

            var forward = posP.clone().sub(posM);
            var radial = pos.clone().normalize();
            forward.sub(radial.clone().multiplyScalar(forward.dot(radial)));
            if (forward.lengthSq() < 1e-10) continue;
            forward.normalize();

            if (fish.smoothPos === null) {
              fish.smoothPos = pos.clone();
              fish.smoothFwd = forward.clone();
            }
            fish.smoothPos.lerp(pos, posSmoothRate);
            fish.smoothFwd.lerp(forward, fwdSmoothRate).normalize();

            var rSmooth = fish.smoothPos.clone().normalize();
            var fSmooth = fish.smoothFwd.clone();
            fSmooth.sub(rSmooth.clone().multiplyScalar(fSmooth.dot(rSmooth)));
            if (fSmooth.lengthSq() < 1e-10) fSmooth.copy(forward);
            else fSmooth.normalize();

            var side = new THREE.Vector3().crossVectors(rSmooth, fSmooth).normalize();
            var basis = new THREE.Matrix4().makeBasis(fSmooth, rSmooth, side);

            var bank =
              Math.sin(tSec * fish.wobbleSpeed * 1.25 + fish.wobble) * 0.14 +
              Math.sin(tSec * 2.15 + fish.wobble * 1.2) * 0.09 +
              swayBody * 1.15;
            var qBasis = new THREE.Quaternion().setFromRotationMatrix(basis);
            var qBank = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), bank);
            var targetQ = qBasis.multiply(qBank);

            fish.mesh.position.copy(fish.smoothPos);
            fish.mesh.quaternion.slerp(targetQ, rotSmoothRate);
          }

          if (beachBall && beachBall.mesh) {
            var bb = beachBall;
            var lonB = bb.phase + tSec * bb.speed * bb.dir;
            lonB = ((lonB % twoPi) + twoPi) % twoPi;
            var swayB =
              Math.sin(tSec * 0.74 + bb.wobble) * 0.018 +
              Math.sin(tSec * 1.32 + bb.wobble * 1.6) * 0.01;
            var latB = riverLatitude(lonB) + bb.lateral + swayB;
            var bobB =
              Math.sin(tSec * 1.14 + bb.wobble) * 0.018 +
              Math.sin(tSec * 2.4 + bb.wobble * 0.7) * 0.007;
            var waterHB = 0.18 + bobB;
            var posB = riverPoint(lonB, latB, waterHB);
            var epsB = 0.045 * bb.dir;
            var lonBM = ((lonB - epsB) % twoPi + twoPi) % twoPi;
            var lonBP = ((lonB + epsB) % twoPi + twoPi) % twoPi;
            var posBM = riverPoint(lonBM, riverLatitude(lonBM) + bb.lateral + swayB, waterHB);
            var posBP = riverPoint(lonBP, riverLatitude(lonBP) + bb.lateral + swayB, waterHB);
            var forwardB = posBP.clone().sub(posBM);
            var radialB = posB.clone().normalize();
            forwardB.sub(radialB.clone().multiplyScalar(forwardB.dot(radialB)));
            if (forwardB.lengthSq() < 1e-10) forwardB.set(0, 0, 1);
            else forwardB.normalize();
            if (bb.smoothPos === null) {
              bb.smoothPos = posB.clone();
              bb.smoothFwd = forwardB.clone();
            }
            bb.smoothPos.lerp(posB, posSmoothRate * 0.88);
            bb.smoothFwd.lerp(forwardB, fwdSmoothRate * 0.85).normalize();
            var rB = bb.smoothPos.clone().normalize();
            var fB = bb.smoothFwd.clone();
            fB.sub(rB.clone().multiplyScalar(fB.dot(rB)));
            if (fB.lengthSq() < 1e-10) fB.copy(forwardB);
            else fB.normalize();
            var sideB = new THREE.Vector3().crossVectors(rB, fB).normalize();
            var basisB = new THREE.Matrix4().makeBasis(fB, rB, sideB);
            var qBasisB = new THREE.Quaternion().setFromRotationMatrix(basisB);
            var qSpinB = new THREE.Quaternion().setFromAxisAngle(
              sideB,
              tSec * 1.45 + Math.sin(tSec * 0.6 + bb.wobble) * 0.25
            );
            var qRollB = new THREE.Quaternion().setFromAxisAngle(
              fB,
              Math.sin(tSec * 1.1 + bb.wobble) * 0.16
            );
            beachBall.mesh.position.copy(bb.smoothPos);
            beachBall.mesh.quaternion.slerp(qBasisB.multiply(qSpinB).multiply(qRollB), rotSmoothRate);
          }

          /* Orange inflatable ring drifting with current */
          if (riverFloater && riverFloater.mesh) {
            var fl = riverFloater;
            var lonF = fl.phase + tSec * fl.speed * fl.dir;
            lonF = ((lonF % twoPi) + twoPi) % twoPi;

            var swayF =
              Math.sin(tSec * 0.82 + fl.wobble) * 0.015 +
              Math.sin(tSec * 1.27 + fl.wobble * 1.63) * 0.009;
            var latRiverF = riverLatitude(lonF);
            var latF = latRiverF + fl.lateral + swayF;

            var bobF =
              Math.sin(tSec * 0.98 + fl.wobble * 1.15) * 0.008 +
              Math.sin(tSec * 2.05 + fl.wobble) * 0.004;
            var waterHF = 0.034 + bobF;

            var posF = riverPoint(lonF, latF, waterHF);
            var radialTargetF = posF.clone().sub(PLANET_CENTER).normalize();
            var targetRadiusF = posF.distanceTo(PLANET_CENTER);

            var epsF = 0.042 * fl.dir;
            var lonFM = lonF - epsF;
            var lonFP = lonF + epsF;
            lonFM = ((lonFM % twoPi) + twoPi) % twoPi;
            lonFP = ((lonFP % twoPi) + twoPi) % twoPi;
            var latFM = riverLatitude(lonFM) + fl.lateral + swayF;
            var latFP = riverLatitude(lonFP) + fl.lateral + swayF;
            var posFM = riverPoint(lonFM, latFM, waterHF);
            var posFP = riverPoint(lonFP, latFP, waterHF);

            var forwardF = posFP.clone().sub(posFM);
            forwardF.sub(radialTargetF.clone().multiplyScalar(forwardF.dot(radialTargetF)));
            if (forwardF.lengthSq() < 1e-10) forwardF.set(0, 0, 1);
            else forwardF.normalize();

            var surfaceTargetF = PLANET_CENTER.clone().add(
              radialTargetF.clone().multiplyScalar(PLANET_RADIUS)
            );
            if (fl.smoothPos === null) {
              fl.smoothPos = surfaceTargetF.clone();
              fl.smoothFwd = forwardF.clone();
            }
            fl.smoothPos.lerp(surfaceTargetF, posSmoothRate * 0.82);
            fl.smoothFwd.lerp(forwardF, fwdSmoothRate * 0.82).normalize();

            var rF = fl.smoothPos.clone().sub(PLANET_CENTER).normalize();
            var fF = fl.smoothFwd.clone();
            fF.sub(rF.clone().multiplyScalar(fF.dot(rF)));
            if (fF.lengthSq() < 1e-10) fF.copy(forwardF);
            else fF.normalize();

            var sideF = new THREE.Vector3().crossVectors(rF, fF).normalize();
            var basisF = new THREE.Matrix4().makeBasis(fF, rF, sideF);

            var rollF =
              (Math.sin(tSec * 0.72 + fl.wobble) * 0.11 +
                Math.sin(tSec * 1.05 + fl.wobble * 1.4) * 0.06);
            var qBasisF = new THREE.Quaternion().setFromRotationMatrix(basisF);
            var qRollF = new THREE.Quaternion().setFromAxisAngle(fF, rollF);
            var qComb = qBasisF.clone().multiply(qRollF);
            var qYaw180 = new THREE.Quaternion().setFromAxisAngle(rF, Math.PI);
            var targetQF = qYaw180.multiply(qComb);
            var floaterPosF = PLANET_CENTER.clone().add(
              rF.clone().multiplyScalar(targetRadiusF)
            );

            riverFloater.mesh.position.copy(floaterPosF);
            riverFloater.mesh.quaternion.slerp(targetQF, rotSmoothRate * 0.9);
            riverFloater.mesh.position.addScaledVector(rF, -0.056);
          }
        }
        if (typeof AFRAME !== "undefined") {
          if (!AFRAME.components["river-animation-loop"]) {
            AFRAME.registerComponent("river-animation-loop", {
              tick: function (timeMs) {
                animateRiver(timeMs);
              }
            });
          }
          lake.setAttribute("river-animation-loop", "");
        } else {
          function animateRiverFallback(timeMs) {
            animateRiver(timeMs);
            requestAnimationFrame(animateRiverFallback);
          }
          requestAnimationFrame(animateRiverFallback);
        }

        /*
         * Same placement logic as mountain onlookers: grass normals between peak and river,
         * used for summit cross yaw (faces viewers) and character anchors.
         */
        function computeMountainVisitorAnchors(mLon, mLat, riverLatitudeFn) {
          function normalToLonLat(dir3) {
            var lat = Math.asin(THREE.MathUtils.clamp(dir3.y, -1, 1));
            var lon = Math.atan2(dir3.x, dir3.z);
            return { lon: lon, lat: lat };
          }
          function slerpUnitNormals(uA, uB, tt) {
            var dotAB = THREE.MathUtils.clamp(uA.dot(uB), -1, 1);
            var omega = Math.acos(dotAB);
            if (omega < 1e-6) return uA.clone();
            var sinO = Math.sin(omega);
            return uA
              .clone()
              .multiplyScalar(Math.sin((1 - tt) * omega) / sinO)
              .add(uB.clone().multiplyScalar(Math.sin(tt * omega) / sinO))
              .normalize();
          }

          var cosMt = Math.cos(mLat);
          var mountNorm = new THREE.Vector3(
            Math.sin(mLon) * cosMt,
            Math.sin(mLat),
            Math.cos(mLon) * cosMt
          ).normalize();

          var rivBestDot = -999;
          var riverClosestNorm = new THREE.Vector3(0, 1, 0);
          var gj;
          for (gj = 0; gj <= 720; gj++) {
            var rLon = (gj / 720) * Math.PI * 2;
            var rLat = riverLatitudeFn(rLon);
            var rcx = Math.cos(rLat);
            var rv = new THREE.Vector3(
              Math.sin(rLon) * rcx,
              Math.sin(rLat),
              Math.cos(rLon) * rcx
            ).normalize();
            var dDot = rv.dot(mountNorm);
            if (dDot > rivBestDot) {
              rivBestDot = dDot;
              riverClosestNorm.copy(rv);
            }
          }

          var grassNorm = null;
          var tCand = [
            0.3, 0.34, 0.38, 0.42, 0.46, 0.5, 0.54, 0.58, 0.62, 0.66
          ];
          for (gj = 0; gj < tCand.length; gj++) {
            var tn = slerpUnitNormals(mountNorm, riverClosestNorm, tCand[gj]);
            var ll = normalToLonLat(tn);
            var bankGap = Math.abs(ll.lat - riverLatitudeFn(ll.lon));
            var peakDot = tn.dot(mountNorm);
            if (
              bankGap > 0.174 &&
              bankGap < 0.5 &&
              peakDot < 0.942 &&
              peakDot > 0.58
            ) {
              grassNorm = tn;
              break;
            }
          }
          if (!grassNorm) {
            grassNorm = slerpUnitNormals(mountNorm, riverClosestNorm, 0.33);
          }
          grassNorm = slerpUnitNormals(grassNorm, riverClosestNorm, 0.19);

          var surfFrm = getSurfaceFrame(grassNorm);
          var sideSep = 0.055;
          var girlNorm = grassNorm
            .clone()
            .add(surfFrm.east.clone().multiplyScalar(sideSep))
            .normalize();
          var boyNorm = grassNorm
            .clone()
            .add(surfFrm.east.clone().multiplyScalar(-sideSep * 1.06))
            .normalize();

          return {
            girlNorm: girlNorm,
            boyNorm: boyNorm,
            girlLL: normalToLonLat(girlNorm),
            boyLL: normalToLonLat(boyNorm)
          };
        }

        function createTree(normal, scale, skipAppend) {
          var tree = document.createElement("a-entity");
          var trunk = document.createElement("a-cylinder");
          var crown = document.createElement("a-sphere");

          var tallMul = 1.22;
          trunk.setAttribute("position", "0 " + (0.44 * scale * tallMul) + " 0");
          trunk.setAttribute("radius", 0.072 * scale);
          trunk.setAttribute("height", 0.88 * scale * tallMul);
          trunk.setAttribute("color", "#8B5A2B");

          crown.setAttribute("position", "0 " + (1.07 * scale * tallMul) + " 0");
          crown.setAttribute("radius", 0.4 * scale);
          crown.setAttribute("scale", "1 1 1.22");
          crown.setAttribute("color", crownPalette[Math.floor(random() * crownPalette.length)]);

          tree.appendChild(trunk);
          tree.appendChild(crown);
          var burnRoll = random();
          if (burnRoll < 0.58) {
            var burnLevel = burnRoll < 0.18 ? 1.65 : burnRoll < 0.38 ? 1.18 : 0.82;
            var burnA = createNightFlameCluster(
              (random() - 0.5) * 0.12 * scale,
              (0.56 + random() * 0.18) * scale,
              (random() - 0.5) * 0.1 * scale,
              burnLevel * 0.62 * scale,
              Math.floor(random() * 900)
            );
            var burnB = createNightFlameCluster(
              (random() - 0.5) * 0.16 * scale,
              (0.88 + random() * 0.24) * scale,
              (random() - 0.5) * 0.14 * scale,
              burnLevel * 0.5 * scale,
              Math.floor(500 + random() * 1000)
            );
            var smokeA = createNightSmokePuff(
              (random() - 0.5) * 0.1 * scale,
              (1.03 + random() * 0.18) * scale,
              (random() - 0.5) * 0.1 * scale,
              burnLevel * 1.05 * scale,
              Math.floor(random() * 1200)
            );
            tree.appendChild(burnA);
            if (burnLevel > 0.7) tree.appendChild(burnB);
            if (burnLevel > 1.1) {
              tree.appendChild(
                createNightFlameCluster(
                  (random() - 0.5) * 0.2 * scale,
                  (1.12 + random() * 0.18) * scale,
                  (random() - 0.5) * 0.18 * scale,
                  burnLevel * 0.36 * scale,
                  Math.floor(900 + random() * 1100)
                )
              );
            }
            tree.appendChild(smokeA);
          }
          if (skipAppend) return null;
          trees.appendChild(tree);
          placeYUpEntityOnPlanet(tree, normal, 0.02);
          return tree;
        }

        function humanCircleNormalAt(angle, target) {
          var longitude = Math.cos(angle) * 0.46;
          var latitude = 0.55 + Math.sin(angle) * 0.3;
          var cosLat = Math.cos(latitude);
          return target
            .set(
              Math.sin(longitude) * cosLat,
              Math.sin(latitude),
              Math.cos(longitude) * cosLat
            )
            .normalize();
        }

        function slerpUnitNormals(from, to, amount, target) {
          var dot = THREE.MathUtils.clamp(from.dot(to), -1, 1);
          var omega = Math.acos(dot);
          if (omega < 1e-6) return target.copy(to);
          var sinOmega = Math.sin(omega);
          return target
            .copy(from)
            .multiplyScalar(Math.sin((1 - amount) * omega) / sinOmega)
            .add(
              to
                .clone()
                .multiplyScalar(Math.sin(amount * omega) / sinOmega)
            )
            .normalize();
        }

        function estimateInitialHumanStopNormal(target) {
          var cameraEl = document.querySelector("[camera]");
          if (!cameraEl || !cameraEl.object3D || !worldRoot.object3D) return null;

          cameraEl.object3D.updateMatrixWorld(true);
          worldRoot.object3D.updateMatrixWorld(true);

          var c = cameraLocal.lengthSq() - Math.pow(PLANET_RADIUS + 0.12, 2);

          var t = -b - Math.sqrt(disc);

          if (t < 0) return null;

          var visitNormal = cameraLocal
            .clone()
            .add(cameraForward.multiplyScalar(t))

          /* Loose outer radius vs height so spiral stays outside authored rock mass */
          function silhouetteRadiusAtY(y) {
            var yy = Math.max(0.05, Math.min(1.56, y));
            var yA = 0.05;
            var yB = 0.55;
            var yC = 1.05;
            var yD = 1.52;
            var rA = 1.06;
            var rB = 0.72;
            var rC = 0.5;
            var rD = 0.33;
            if (yy <= yB) {
              var u = (yy - yA) / (yB - yA);
              return rA + (rB - rA) * Math.max(0, Math.min(1, u));
            }
            if (yy <= yC) {
              var u2 = (yy - yB) / (yC - yB);
              return rB + (rC - rB) * Math.max(0, Math.min(1, u2));
            }
            var u3 = (yy - yC) / (yD - yC);
            return rC + (rD - rC) * Math.max(0, Math.min(1, u3));
          }

          function addPrayerSpiral(theta0, directionSign, segments, turns, spiralId, opts) {
            if (!opts) opts = {};
            var palette =
              opts.palette ||
              ["#203B66", "#EDEDED", "#C1272D", "#2D8C4E", "#E3B424"];
            var colourShift =
              opts.colourShift !== undefined ? opts.colourShift : 0;
            var cx = 0.05 + (opts.cxSkew || 0);
            var cz = 0.03 + (opts.czSkew || 0);
            var yTop = opts.yTop !== undefined ? opts.yTop : 1.56;
            var yBot = opts.yBot !== undefined ? opts.yBot : 0.74;
            var radialBoost =
              opts.radialBoost !== undefined ? opts.radialBoost : 0;

            var pts = [];
            var si;
            for (si = 0; si <= segments; si++) {
              var t = si / segments;
              var y = yTop + (yBot - yTop) * t;
              /* Tighter clearance at spiral ends so cord terminates on rock/plateau; fuller gap mid-span */
              var midFan = Math.sin(t * Math.PI);
              /* Extra radial clearance near foot (t→1): silhouette is wide there and cord was hugging rock */
              var bottomFan = t * t * 0.082;
              var threadGap =
                0.014 +
                radialBoost +
                midFan * (0.048 + (1 - t) * 0.055) +
                bottomFan;
              var R = silhouetteRadiusAtY(y) + threadGap;
              var theta = theta0 + directionSign * turns * Math.PI * 2 * t;
              pts.push({
                x: cx + R * Math.cos(theta),
                y: y,
                z: cz + R * Math.sin(theta)
              });
            }

            /* Sink cord endpoints radially + downward so they sit on slope instead of hovering */
            (function tuckCordEnds() {
              var p0 = pts[0];
              var rdx0 = p0.x - cx;
              var rdz0 = p0.z - cz;
              var r0 = Math.sqrt(rdx0 * rdx0 + rdz0 * rdz0);
              if (r0 > 1e-6) {
                var kr0 = 0.052 / r0;
                p0.x -= rdx0 * kr0;
                p0.z -= rdz0 * kr0;
              }
              p0.y -= 0.026;

              var pe = pts[pts.length - 1];
              var rdxE = pe.x - cx;
              var rdzE = pe.z - cz;
              var rE = Math.sqrt(rdxE * rdxE + rdzE * rdzE);
              if (rE > 1e-6) {
                var krE = 0.028 / rE;
                pe.x -= rdxE * krE;
                pe.z -= rdzE * krE;
              }
              pe.y -= 0.022;
            })();

            for (si = 0; si < segments; si++) {
              var a = pts[si];
              var b = pts[si + 1];
              var mx = (a.x + b.x) * 0.5;
              var my = (a.y + b.y) * 0.5;
              var mz = (a.z + b.z) * 0.5;
              var segLen = Math.sqrt(
                (b.x - a.x) * (b.x - a.x) +
                  (b.y - a.y) * (b.y - a.y) +
                  (b.z - a.z) * (b.z - a.z)
              );
              var threadSeg = document.createElement("a-cylinder");
              threadSeg.setAttribute("position", mx + " " + my + " " + mz);
              threadSeg.setAttribute("height", segLen);
              threadSeg.setAttribute("radius", "0.0035");
              threadSeg.setAttribute("segments-radial", "6");
              threadSeg.setAttribute("color", "#BAA898");
              threadSeg.setAttribute(
                "material",
                "shader: standard; roughness: 0.93; metalness: 0"
              );
              root.appendChild(threadSeg);
              alignCylinderToChord(threadSeg, a.x, a.y, a.z, b.x, b.y, b.z);

              var fi = si;
              var tx = (a.x + b.x) * 0.5;
              var ty = (a.y + b.y) * 0.5;
              var tz = (a.z + b.z) * 0.5;
              /* Nudge flags inward toward slope so they read attached, not hovering off the cord */
              var rdx = tx - cx;
              var rdz = tz - cz;
              var rLen = Math.sqrt(rdx * rdx + rdz * rdz);
              if (rLen > 1e-5) {
                var pull =
                  fi === 0
                    ? 0.058
                    : fi === segments - 1
                      ? 0.012
                      : 0.036;
                tx -= (rdx / rLen) * pull;
                tz -= (rdz / rLen) * pull;
              }
              var sagMul = fi === 0 ? 0.45 : fi === segments - 1 ? 0.72 : 1;
              var sag =
                sagMul *
                (Math.sin(((fi + 0.5) / segments) * Math.PI) * 0.014 + 0.004);
              ty -= sag;

              var rxA = -14 + (fi % 3) * 3;
              var rzA = -5 + (fi % 4);
              var yaw =
                (Math.atan2(b.x - a.x, b.z - a.z) * 180) / Math.PI + 88 + fi * 6;

              var anchor = document.createElement("a-entity");
              anchor.setAttribute("position", tx + " " + ty + " " + tz);
              anchor.setAttribute("rotation", rxA + " " + yaw + " " + rzA);

              var mid = document.createElement("a-entity");
              mid.setAttribute("position", "0.068 0 0");

              var cloth = document.createElement("a-box");
              cloth.setAttribute("width", "0.15");
              cloth.setAttribute("height", "0.09");

              );
              cloth.setAttribute("rotation", "6 0 -8");

              mid.appendChild(cloth);
              anchor.appendChild(mid);
              root.appendChild(anchor);
            }
          }

          /* Two strands: skewed anchors, spans, winding, palettes — read less mirrored + sit slightly farther out */
          addPrayerSpiral(Math.PI * 0.09, 1, 10, 1.33, 0, {
            cxSkew: -0.06,

        /*
         * Perimeter “log” seats: **not** parented under the scaled campfire root. Those used a
         * flat local Y offset while the globe is curved, so they hovered. Each bench is its own
         * anchor on the sphere (same pattern as trees / house).
         */
        function createCampfireBenches(campfireUnit) {
          var R = PLANET_RADIUS;
          var frame = getSurfaceFrame(campfireUnit);
          var up = frame.up;
          /* Bench ring radius (scaled-local); a bit beyond original 0.54 path */
          var tangentialChord = 0.66 * 2.25;
          var deltaAng = tangentialChord / R;
          var bi;
          for (bi = 0; bi < 5; bi++) {
            /* Stable 0–1 jitter per bench (reproducible, “organic” angles). */
            var rnd = function (salt) {
              var w = Math.imul(bi * 59 + salt * 97, 2654435761);
              return ((w >>> 0) % 10000) / 10000;
            };
            var ba = (bi / 5) * Math.PI * 2 + 0.22;
            var baJ =
              ba +
              (bi % 3 - 1) * 0.09 +
              (rnd(0) - 0.5) * 0.14;
            var tdir = frame.east
              .clone()
              .multiplyScalar(Math.cos(baJ))
              .add(frame.north.clone().multiplyScalar(Math.sin(baJ)))
              .normalize();
            var benchN = up
              .clone()
              .multiplyScalar(Math.cos(deltaAng))
              .add(tdir.clone().multiplyScalar(Math.sin(deltaAng)))
              .normalize();

            var benchRoot = document.createElement("a-entity");
            benchRoot.setAttribute("scale", "2.46 2.46 2.46");
            var bench = document.createElement("a-cylinder");
            bench.setAttribute("position", "0 0 0");
            bench.setAttribute("radius", "0.055");
            bench.setAttribute("height", "0.34");

            benchRoot.appendChild(bench);
            worldRoot.appendChild(benchRoot);
            placeYUpEntityOnPlanet(benchRoot, benchN, 0.03);

            /*
             * Long axis runs **tangential** to the ring (seat faces the fire). Do not blend the
             * “toward campfire” vector into the long axis — that bent every other log into hooked
             * diagonals (read as a swastika from above). Only light in-plane wobble + mild Euler.
             */
            var ringTan = new THREE.Vector3()
              .crossVectors(benchN, tdir)
              .normalize();

            var mixed = ringTan.clone();
            var planeWobble = THREE.MathUtils.degToRad(
              (rnd(1) - 0.5) * 10 + (bi % 3 - 1) * 1.6
            );
            mixed.applyQuaternion(
              new THREE.Quaternion().setFromAxisAngle(
                benchN,
                planeWobble
              )
            );
            mixed.normalize();

            var qInv = benchRoot.object3D.quaternion
              .clone()
              .invert();
            var loc = mixed.clone().applyQuaternion(qInv);
            var yawDeg = THREE.MathUtils.radToDeg(
              Math.atan2(loc.x, loc.z)
            );

            var pitchX = 90 + (rnd(3) - 0.5) * 5;
            var yawTotal = yawDeg + (rnd(4) - 0.5) * 9;
            var rollZ = (rnd(6) - 0.5) * 6;

            bench.setAttribute(
              "rotation",
              pitchX + " " + yawTotal + " " + rollZ
            );
            bench.setAttribute("color", "#7A4B2B");
            bench.setAttribute(
              "material",
              "shader: standard; roughness: 0.86; metalness: 0"
            );
          }
        }

        function isNearCampfire(longitude, latitude) {
          var dLong = Math.abs(longitude - campfireLongitude);
          dLong = Math.min(dLong, Math.PI * 2 - dLong);
          var dLat = latitude - campfireLatitude;
          /*
           * Slightly larger than ~0.055 so a few trees aren’t crowding the ring; still compact.
           */
          return dLong * dLong + dLat * dLat < 0.073;
        }

        /* Same lat extents as createWoodenBridge — keep crowns off deck/railing */
        function woodenBridgeBankLatRange(lon0, spanStretch) {
          var stretch =
            spanStretch !== undefined && spanStretch !== null ? spanStretch : 1;
          var latRiver = riverLatitude(lon0);
          var riverHalfLat = 0.111 * stretch;
          var grassMargin = 0.047 * stretch;
          return {
            latHi: latRiver + riverHalfLat + grassMargin,
            latLo: latRiver - riverHalfLat - grassMargin
          };
        }

        function isNearWoodenBridge(longitude, latitude) {
          var sites = [
            { lon: -0.48, spanStretch: 1 },
            { lon: -0.48 + Math.PI, spanStretch: 1.22 }
          ];
          var lonPad = 0.16;
          var latPad = 0.13;
          var si;
          for (si = 0; si < sites.length; si++) {
            var dLong = Math.abs(longitude - sites[si].lon);
            dLong = Math.min(dLong, Math.PI * 2 - dLong);
            if (dLong > lonPad) continue;
            var br = woodenBridgeBankLatRange(sites[si].lon, sites[si].spanStretch);
            if (
              latitude <= br.latHi + latPad &&
              latitude >= br.latLo - latPad
            ) {
              return true;
            }
          }
          return false;
        }

        /*
         * Vegetable garden patch — anchored inland via latitude offset from the river spine.
         * Trees skip a spherical cone around the anchor so exclusion matches the rotated, scaled layout.
         */
        var vegGardenLon = normalizeLonRad(1.02);
        var vegGardenNorthOfRiver = true;
        var vegGardenLat = 0;
        var vgAdj = 0;
        for (; vgAdj < 28; vgAdj++) {
          var riverSpine = riverLatitude(vegGardenLon);
          var inlandBias =
            0.46 + (vgAdj % 4) * 0.028 + Math.floor(vgAdj / 8) * 0.022;
          vegGardenLat = vegGardenNorthOfRiver
            ? THREE.MathUtils.clamp(riverSpine + inlandBias, -1.36, 1.36)
            : THREE.MathUtils.clamp(riverSpine - inlandBias, -1.36, 1.36);
          var spineGap = Math.abs(vegGardenLat - riverSpine);
          if (
            spineGap >= 0.26 &&
            !isNearRiver(vegGardenLon, vegGardenLat, 0.096) &&
            !isNearMountain(vegGardenLon, vegGardenLat) &&
            !isNearHouse(vegGardenLon, vegGardenLat) &&
            !isNearSign(vegGardenLon, vegGardenLat) &&
            !isNearWoodenBridge(vegGardenLon, vegGardenLat)
          ) {
            break;
          }
          vegGardenLon = normalizeLonRad(vegGardenLon + 0.23);
          if (vgAdj % 7 === 6) vegGardenNorthOfRiver = !vegGardenNorthOfRiver;
        }

        var vegGardenCosLatAnchor = Math.cos(vegGardenLat);
        var vegGardenNormal = new THREE.Vector3(
          Math.sin(vegGardenLon) * vegGardenCosLatAnchor,
          Math.sin(vegGardenLat),
          Math.cos(vegGardenLon) * vegGardenCosLatAnchor
        ).normalize();

        function inVegetableGardenClearing(lon, lat) {
          var cLo = Math.cos(lat);
          var v = new THREE.Vector3(
            Math.sin(lon) * cLo,
            Math.sin(lat),
            Math.cos(lon) * cLo
          ).normalize();
          var dot = THREE.MathUtils.clamp(v.dot(vegGardenNormal), -1, 1);
          /*
           * Angular clearance vs anchor (~21°): scaled footprint (~1.40×), diagonal corners,
           * low row canopy extent, crown margin (cone tracks rotated patch via yaw toward river below).
           */
          return Math.acos(dot) < 0.372;
        }

        function lonLatToUnitCow(lo, la) {
          var c = Math.cos(la);
          return new THREE.Vector3(
            Math.sin(lo) * c,
            Math.sin(la),
            Math.cos(lo) * c

        }

        function globeCowPastureLonLatOk(lo, la) {
          if (isNearRiver(lo, la, 0.1)) return false;
          if (isNearMountain(lo, la)) return false;
          if (isNearHouse(lo, la)) return false;
          if (isNearSign(lo, la)) return false;
          if (isNearWoodenBridge(lo, la)) return false;
          if (inVegetableGardenClearing(lo, la)) return false;
          return true;
        }

        function sampleGlobeCowGrazeLonLat(rr, avoidUnit, avoidDotMax) {
          var qi;
          for (qi = 0; qi < 420; qi++) {
            var lo = vegGardenLon + (rr() * 1.15 - 0.575);
            var la =
              vegGardenLat + 0.07 + rr() * 0.42 - rr() * 0.082;
            if (!globeCowPastureLonLatOk(lo, la)) continue;
            if (avoidUnit) {
              var cand = lonLatToUnitCow(lo, la);
              if (
                cand.dot(avoidUnit) >
                avoidDotMax
              )
                continue;
            }
            return { lon: lo, lat: la };
          }
          return null;
        }

            var frm0 = getSurfaceFrame(this.vCurr);

            this.pickCowTarget(true);
            if (this.vTgt.lengthSq() < 1e-12) {

          pickCowTarget: function (initial) {

            var pick = sampleGlobeCowGrazeLonLat(
              this._rnd,
              initial ? null : this.vCurr,
              initial ? 2 : avoidDm

            var qi;
            if (!pick) {
              for (qi = 0; qi < 160; qi++) {
                pick = sampleGlobeCowGrazeLonLat(
                  this._rnd,
                  null,
                  null

                if (pick) break;
              }
            }
            if (!pick) {
              var frx = getSurfaceFrame(this.vCurr);
              var wob =
                frx.east.clone().multiplyScalar((this._rnd() - 0.5) * 0.5);
              wob.addScaledVector(
                frx.north,
                (this._rnd() - 0.5) * 0.5
              );
              this.vTgt.copy(this.vCurr).add(wob).normalize();
            } else {
              this.vTgt.copy(
                lonLatToUnitCow(pick.lon, pick.lat)
              );
            }
            var jitterI = 0;
            while (
              this.vTgt.dot(this.vCurr) > 0.994 &&
              jitterI < 16
            ) {
              jitterI++;
              var sh = getSurfaceFrame(this.vCurr);
              this.vTgt
                .addScaledVector(sh.east, (this._rnd() - 0.5) * 0.12)
                .addScaledVector(
                  sh.north,
                  (this._rnd() - 0.5) * 0.11
                )
                .normalize();

              initial ? 0 : 0.9 + this._rnd() * 6.2;

          tick: function (_, deltaMs) {

            /* Ground truth radial from anchored mesh (fixes init timing + quaternion drift). */
            this.shellUp.copy(this.el.object3D.position);
            if (this.shellUp.lengthSq() < 1e-12) {
              this.shellUp.copy(this.vCurr).multiplyScalar(
                PLANET_RADIUS + this.data.surfaceLift
              );
            }

              THREE.MathUtils.clamp(
                this.vCurr.dot(this.vTgt),
                -1,
                1

            var angBetw = Math.acos(dc);
            var angTol = 0.0055;
            var moving =
              Math.abs(angBetw) > angTol &&
              angBetw === angBetw;

            var surfR =
              PLANET_RADIUS +
              this.data.surfaceLift +
              Math.abs(Math.sin(this.stridePhase)) *
                (moving ? 0.0048 : 0.00295);

            var maxStepArc =
              (this.data.speed * dt) / PLANET_RADIUS;
            if (
              !(maxStepArc > 0) ||
              maxStepArc !== maxStepArc
            )
              maxStepArc = 1e-9;

            if (!moving) {
              this.idleLeft -= dt;
              this.stridePhase += dt * 0.94;
              this.vCurr.copy(this.vTgt).normalize();

                this.pickCowTarget(false);

               * Explicit great-circle step (works on all bundled THREE revisions).
               * vNext = normalize( cos(s)*vCurr + sin(s)*tang ); tang tangent toward vTgt.
