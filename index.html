              var minStepArc = Math.min(
                0.0018,
                maxStepArc * 0.55
              );
              var stepToward = Math.min(
                maxStepArc,
                Math.max(
                  minStepArc,
                  angBetw - angTol * 0.55
                )

                -this.vTgt.dot(this.vCurr)

                this.pickCowTarget(false);
                this.tan.copy(this.lastFwd);
                this.tan.addScaledVector(
                  this.vCurr,

                -this.vTgt.dot(this.vCurr)

                this.tan.copy(this.lastFwd);

                this.vCurr,
                -this.lastFwd.dot(this.vCurr)

            this.side.crossVectors(this.shellUp, this.motion).normalize();
            if (this.side.lengthSq() < 1e-14) {

            }

              this.side,
              this.shellUp,
              this.motion
            );

              this.rMat
            );
            this.el.object3D.quaternion.normalize();

            this.el.object3D.position
              .copy(PLANET_CENTER)

        function createVegetableGardenInClearing(gNorm, chickenDefs, roamOutsideX, roamOutsideZ) {
          var vegRoot = document.createElement("a-entity");
          /* Slightly smaller than prior 1.48; keep uniform scale so layout stays proportional. */
          var vegGardenScale = 1.4;
          vegRoot.setAttribute(
            "scale",
            vegGardenScale + " " + vegGardenScale + " " + vegGardenScale
          );
          vegetableGarden.appendChild(vegRoot);
          /* Ground anchor for chickens only; no garden geometry remains. */
          placeYUpEntityOnPlanet(vegRoot, gNorm, -0.006);

          var chickenAnchorLat = Math.asin(THREE.MathUtils.clamp(gNorm.y, -1, 1));
          var chickenAnchorLon = Math.atan2(gNorm.x, gNorm.z);
          /* −Z “front” faces downslope toward the river along the meridian (same lon). */
          var riverLatHere = riverLatitude(chickenAnchorLon);
          var northTan = new THREE.Vector3(
            -Math.sin(chickenAnchorLon) * Math.sin(chickenAnchorLat),
            Math.cos(chickenAnchorLat),
            -Math.cos(chickenAnchorLon) * Math.sin(chickenAnchorLat)
          ).normalize();
          var towardRiver =
            chickenAnchorLat > riverLatHere + 1e-6
              ? northTan.clone().multiplyScalar(-1)
              : northTan.clone();
          towardRiver.normalize();

          var worldFront = new THREE.Vector3(0, 0, -1).applyQuaternion(
            vegRoot.object3D.quaternion
          ).normalize();
          var up = gNorm.clone().normalize();
          var yawRiver = Math.atan2(
            worldFront.clone().cross(towardRiver).dot(up),
            THREE.MathUtils.clamp(worldFront.dot(towardRiver), -1, 1)
          );
          vegRoot.object3D.rotateY(yawRiver + 0.07);

          /* Vegetable patch removed: keep only the chickens on the grass-level anchor. */
          var chickenFeetY = 0.001;
          var chickenBedFeetY = chickenFeetY;
          var chickenBodyScale = 4.15;
          var chickenMatBody =
            "shader: standard; roughness: 0.71; metalness: 0";
          var birds =
            chickenDefs || [
              { mode: "inside", id: 31 },
              { mode: "outside", id: 52 },
              { mode: "outside", id: 79 },
              { mode: "outside", id: 94 }
            ];
          for (var cb = 0; cb < birds.length; cb++) {
            appendVegGardenChicken(birds[cb].mode, birds[cb].id);
          }

          function appendVegGardenChicken(mode, wanderId) {
            var ch = document.createElement("a-entity");
            ch.setAttribute(
              "scale",
              chickenBodyScale + " " + chickenBodyScale + " " + chickenBodyScale
            );
            ch.setAttribute(
              "veg-garden-chicken-walk",
              "mode: " +
                mode +
                "; feetY: " +
                chickenFeetY +
                "; bedFeetY: " +
                chickenBedFeetY +
                "; wanderId: " +
                wanderId +
                "; roamX: " +
                (mode === "outside" ? (roamOutsideX || 1.42) : (roamOutsideX || 1.42) * 0.64) +
                "; roamZ: " +
                (mode === "outside" ? (roamOutsideZ || 0.74) : (roamOutsideZ || 0.74) * 0.64) +
                "; speed: " +
                (mode === "outside" ? 0.272 : 0.216)
            );

            var body = document.createElement("a-sphere");
            body.setAttribute("position", "0 0.041 0");
            body.setAttribute("radius", "0.026");
            body.setAttribute("scale", "1 0.88 1.05");
            body.setAttribute("color", "#EDE4D3");
            body.setAttribute("material", chickenMatBody);

            /* Thin plates on ±X flanks — slightly smaller; tucked motion is eased in tick. */
            var wingL = document.createElement("a-box");
            wingL.setAttribute("class", "chicken-wing-l");
            wingL.setAttribute("position", "0.031 0.041 -0.002");
            wingL.setAttribute("rotation", "14 -34 131");
            wingL.setAttribute("width", "0.0048");
            wingL.setAttribute("height", "0.019");
            wingL.setAttribute("depth", "0.028");
            wingL.setAttribute("color", "#BFB3A5");
            wingL.setAttribute("material", chickenMatBody);

            var wingR = document.createElement("a-box");
            wingR.setAttribute("class", "chicken-wing-r");
            wingR.setAttribute("position", "-0.031 0.041 -0.002");
            wingR.setAttribute("rotation", "14 34 -131");
            wingR.setAttribute("width", "0.0048");
            wingR.setAttribute("height", "0.019");
            wingR.setAttribute("depth", "0.028");
            wingR.setAttribute("color", "#BFB3A5");
            wingR.setAttribute("material", chickenMatBody);

            var head = document.createElement("a-sphere");
            head.setAttribute("class", "chicken-head");
            head.setAttribute("position", "0 0.066 0.02");
            head.setAttribute("radius", "0.0165");
            head.setAttribute("color", "#EFE6D5");
            head.setAttribute("material", chickenMatBody);

            var eyeMat =
              "shader: standard; roughness: 0.45; metalness: 0";
            var eyeL = document.createElement("a-sphere");
            eyeL.setAttribute("position", "0.007 0.069 0.035");
            eyeL.setAttribute("radius", "0.0026");
            eyeL.setAttribute("color", "#111111");
            eyeL.setAttribute("material", eyeMat);
            var eyeR = document.createElement("a-sphere");
            eyeR.setAttribute("position", "-0.007 0.069 0.035");
            eyeR.setAttribute("radius", "0.0026");
            eyeR.setAttribute("color", "#111111");
            eyeR.setAttribute("material", eyeMat);

            var comb = document.createElement("a-box");
            comb.setAttribute("position", "0 0.074 -0.001");
            comb.setAttribute("width", "0.017");
            comb.setAttribute("height", "0.010");
            comb.setAttribute("depth", "0.014");
            comb.setAttribute("color", "#C62828");
            comb.setAttribute("material", chickenMatBody);

            var tail = document.createElement("a-cone");
            tail.setAttribute("position", "0 0.045 -0.034");
            tail.setAttribute("rotation", "-90 0 0");
            tail.setAttribute("radius-bottom", "0.014");
            tail.setAttribute("radius-top", "0.0015");
            tail.setAttribute("height", "0.028");
            tail.setAttribute("color", "#DDD2C4");
            tail.setAttribute("material", chickenMatBody);

            var beak = document.createElement("a-cone");
            beak.setAttribute("position", "0 0.062 0.038");
            beak.setAttribute("rotation", "90 -7 -4");
            beak.setAttribute("radius-bottom", "0.0088");
            beak.setAttribute("radius-top", "0");
            beak.setAttribute("height", "0.026");
            beak.setAttribute("color", "#E89C3A");
            beak.setAttribute("material", chickenMatBody);

            var legL = document.createElement("a-cylinder");
            legL.setAttribute("class", "chicken-leg-l");
            legL.setAttribute("position", "0.011 0.011 0.006");
            legL.setAttribute("radius", "0.0058");
            legL.setAttribute("height", "0.024");
            legL.setAttribute("color", "#E8BF6A");
            legL.setAttribute("material", chickenMatBody);

            var legR = document.createElement("a-cylinder");
            legR.setAttribute("class", "chicken-leg-r");
            legR.setAttribute("position", "-0.011 0.011 0.006");
            legR.setAttribute("radius", "0.0058");
            legR.setAttribute("height", "0.024");
            legR.setAttribute("color", "#E8BF6A");
            legR.setAttribute("material", chickenMatBody);

            ch.appendChild(body);
            ch.appendChild(wingL);
            ch.appendChild(wingR);
            ch.appendChild(head);
            ch.appendChild(eyeL);
            ch.appendChild(eyeR);
            ch.appendChild(comb);
            ch.appendChild(tail);
            ch.appendChild(beak);
            ch.appendChild(legL);
            ch.appendChild(legR);

            vegRoot.appendChild(ch);
          }
        }

        var placed = [];
        var attempts = 0;
        while (placed.length < 260 && attempts < 10000) {
          attempts++;
          var longitude = random() * Math.PI * 2;
          var latitude = -1.47 + random() * 2.94;

          var tooClose = false;
          for (var i = 0; i < placed.length; i++) {
            var dLong = Math.abs(longitude - placed[i].longitude);
            dLong = Math.min(dLong, Math.PI * 2 - dLong);
            var dLat = latitude - placed[i].latitude;
            if (dLong * dLong + dLat * dLat < 0.022) {
              tooClose = true;
              break;
            }
          }
          if (tooClose) continue;

          var cosLat = Math.cos(latitude);
          var normal = new THREE.Vector3(
            Math.sin(longitude) * cosLat,
            Math.sin(latitude),
            Math.cos(longitude) * cosLat
          ).normalize();
          /*
           * River uses a wide no-tree strip so crowns don't clip the water; that band plus
           * isNearMountain can erase obvious “forest” between peak and stream unless the bank margin is modest.
           */
          if (isNearRiver(longitude, latitude, 0.038)) continue;
          if (isNearHouse(longitude, latitude)) continue;
          if (isNearMountain(longitude, latitude)) continue;
          if (isNearSign(longitude, latitude)) continue;
          if (isInHouseSignNoTreeZone(longitude, latitude)) continue;
          if (isNearUmbrellaChair(longitude, latitude)) continue;
          if (isNearWoodenBridge(longitude, latitude)) continue;
          if (isNearCampfire(longitude, latitude)) continue;
          if (inVegetableGardenClearing(longitude, latitude)) continue;

          var treeScale = 1.12 + random() * 0.48;
          createTree(
            normal,
            treeScale,
            isFrontHouseRiverbankNoTreeZone(longitude, latitude)
          );
          placed.push({ longitude: longitude, latitude: latitude });
        }

        /*
         * Uniform random passes often skip the **wedge** between the river no-tree band and the
         * campfire — bare planet reads as a flat green patch. Bias extra samples along that arc.
         */
        {
          var fillTry = 0;
          var fillPlaced = 0;
          while (fillPlaced < 14 && fillTry < 750) {
            fillTry++;
            var lo =
              campfireLongitude +
              (random() - 0.5) * 0.88;
            lo = normalizeLonRad(lo);
            var sp = riverLatitude(lo);
            var la = sp + 0.122 + random() * 0.31;
            la = THREE.MathUtils.clamp(la, -1.35, 1.38);

            var tooFill = false;
            var pj;
            for (pj = 0; pj < placed.length; pj++) {
              var dLg = Math.abs(lo - placed[pj].longitude);
              dLg = Math.min(dLg, Math.PI * 2 - dLg);
              var dLt = la - placed[pj].latitude;
              if (dLg * dLg + dLt * dLt < 0.0185) {
                tooFill = true;
                break;
              }
            }
            if (tooFill) continue;

            var cosLf = Math.cos(la);
            var nFill = new THREE.Vector3(
              Math.sin(lo) * cosLf,
              Math.sin(la),
              Math.cos(lo) * cosLf
            ).normalize();

            if (isNearRiver(lo, la, 0.038)) continue;
            if (isNearHouse(lo, la)) continue;
            if (isNearMountain(lo, la)) continue;
            if (isNearSign(lo, la)) continue;
            if (isInHouseSignNoTreeZone(lo, la)) continue;
            if (isNearUmbrellaChair(lo, la)) continue;
            if (isNearWoodenBridge(lo, la)) continue;
            if (isNearCampfire(lo, la)) continue;
            if (inVegetableGardenClearing(lo, la)) continue;

            var fillTreeScale = 1.12 + random() * 0.48;
            createTree(
              nFill,
              fillTreeScale,
              isFrontHouseRiverbankNoTreeZone(lo, la)
            );
            placed.push({ longitude: lo, latitude: la });
            fillPlaced++;
          }
        }

        var chickenSideLon = houseLongitude + 0.58;
        var chickenSideLat = houseLatitude + 0.035;
        var chickenSideCosLat = Math.cos(chickenSideLat);
        var chickenSideNormal = new THREE.Vector3(
          Math.sin(chickenSideLon) * chickenSideCosLat,
          Math.sin(chickenSideLat),
          Math.cos(chickenSideLon) * chickenSideCosLat
        ).normalize();
        createVegetableGardenInClearing(
          chickenSideNormal,
          [
            { mode: "outside", id: 52 },
            { mode: "inside", id: 31 }
          ],
          0.5,
          0.32
        );

        var chickenFrontLon = houseLongitude + 0.14;
        var chickenFrontLat = houseLatitude - 0.265;
        var chickenFrontCosLat = Math.cos(chickenFrontLat);
        var chickenFrontNormal = new THREE.Vector3(
          Math.sin(chickenFrontLon) * chickenFrontCosLat,
          Math.sin(chickenFrontLat),
          Math.cos(chickenFrontLon) * chickenFrontCosLat
        ).normalize();
        createVegetableGardenInClearing(
          chickenFrontNormal,
          [
            { mode: "outside", id: 94 }
          ],
          0.44,
          0.26
        );
        createGlobePastureCow();
      });
    </script>

  <body>
    <a-scene fog="type: exponential; color: #56B9EF; density: 0.001" dystopian-night-cycle>
      <!-- Sky -->
      <a-sky id="sky" color="#56B9EF"></a-sky>

      <!-- Sun -->
      <a-entity id="sun" position="-58 148 -58">

          color="#FFD45A"

        <a-sphere
          radius="9.1"
          segments-width="96"
          segments-height="48"
          color="#FFE08A"

        </a-sphere>
        <a-sphere
          radius="11.25"
          segments-width="96"
          segments-height="48"
          color="#FFF0B8"
          material="shader: flat; opacity: 0.09; transparent: true; side: back; fog: false">
        </a-sphere>
        <a-entity light="type: point; intensity: 1.1; distance: 80; decay: 1.2"></a-entity>
      </a-entity>

      <!-- Full moon for night mode -->
      <a-entity id="moon" position="-58 8 -58" visible="false">
        <a-sphere
          id="moonCore"
          radius="6.4"
          segments-width="96"
          segments-height="48"
          color="#E7D9BC"
          material="shader: standard; roughness: 0.58; metalness: 0; emissive: #E7D9BC; emissiveIntensity: 0; opacity: 0; transparent: true; fog: false">
        </a-sphere>
        <a-sphere
          id="moonHalo"
          radius="8.2"
          segments-width="96"
          segments-height="48"
          color="#DCE9FF"
          material="shader: flat; opacity: 0.22; transparent: true; side: back; depthWrite: false; fog: false">
        </a-sphere>
        <a-sphere
          id="moonOuterHalo"
          radius="9.85"
          segments-width="96"
          segments-height="48"
          color="#EAF2FF"
          material="shader: flat; opacity: 0.08; transparent: true; side: back; depthWrite: false; fog: false">
        </a-sphere>
      </a-entity>

      <!-- Lighting -->
      <a-entity id="ambientLight" light="type: ambient; intensity: 0.78"></a-entity>
      <a-entity id="keyLight" light="type: directional; intensity: 0.95" position="5 8 4"></a-entity>

      <!-- Globe: fixed view facing the house and main character -->
      <a-entity id="worldRoot" position="0 1 -15">
        <!-- Mini planet -->
        <a-sphere
          id="planet"
          radius="8"
          segments-width="64"
          segments-height="48"
          color="#39B54A"
          material="shader: standard; roughness: 1; metalness: 0; emissive: #2f4f1f; emissiveIntensity: 0.05">
        </a-sphere>

        <!-- River, house, flowers, fenced veg beds (forest clearing), trees on globe -->
        <a-entity id="lake"></a-entity>
        <!-- Bridge built in script (crosses river away from the house) -->
        <a-entity id="houses"></a-entity>
        <a-entity id="flowers"></a-entity>
        <a-entity id="vegetableGarden"></a-entity>
        <a-entity id="trees"></a-entity>
        <a-entity id="mountains"></a-entity>

        <!-- Rim clouds around mountain only (no summit storm bank or rain). -->
        <a-entity river-mountain-weather></a-entity>

        <!-- Night-only helicopter searchlight: uneven patrol, not a perfect circle. -->
        <a-entity visible="false" night-helicopter-search="radius: 14.2; speed: 0.18; height: 3.4" scale="2.85 2.85 2.85">
          <a-box position="0 0 0" width="0.68" height="0.2" depth="0.24" color="#1E2528" material="shader: standard; roughness: 0.74; metalness: 0.1"></a-box>
          <a-sphere position="0 0 -0.2" radius="0.17" scale="0.88 0.68 0.66" color="#2C363A" material="shader: standard; roughness: 0.7; metalness: 0.08"></a-sphere>
          <a-box position="0 0 0.58" width="0.1" height="0.065" depth="0.88" color="#182024" material="shader: standard; roughness: 0.76; metalness: 0.1"></a-box>
          <a-box position="0 0.18 0" width="1.35" height="0.032" depth="0.055" color="#11191C" material="shader: standard; roughness: 0.65; metalness: 0.16" animation__rotor="property: rotation; from: 0 0 0; to: 0 360 0; dur: 210; easing: linear; loop: true"></a-box>
          <a-entity class="searchlight-rig" position="0 -0.13 -0.24" rotation="13 0 0">
            <a-cone class="searchlight-beam" position="0 -2.4 0" radius-bottom="0.68" radius-top="0.045" height="4.8" color="#FFF3B0" material="shader: flat; opacity: 0.13; transparent: true; side: double; depthWrite: false"></a-cone>
          </a-entity>
        </a-entity>
